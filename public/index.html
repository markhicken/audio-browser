<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Browser</title>
  <link rel="stylesheet" href="css/styles.css?v=1">
</head>

<body>

  <!-- Header with title + breadcrumbs -->
  <div id="header">
    <div>
      <button id="back-btn" disabled>
        <div class="chevron">&lt;</div>
      </button>
      <button id="forward-btn" disabled>
        <div class="chevron">&gt;</div>
      </button>
    </div>
    <span id="app-title">Home</span>
    <div id="breadcrumbs"></div>
  </div>

  <!-- Filename search -->
  <div id="search-bar">
    <input id="filename-search" type="search" placeholder="Search filenames..." autocomplete="off" spellcheck="false">
  </div>

  <!-- Warning banner (shown when ffmpeg is missing) -->
  <div id="warning"></div>

  <!-- File list -->
  <div id="list-header" class="list-header row">
    <span class="row-icon"></span>
    <span class="row-name sortable" data-sort="name">Name <span class="sort-indicator"></span></span>
    <span class="header-ext sortable" data-sort="ext"
      style="flex-shrink: 0; margin-left: 10px; width: 45px; text-align: center;">Type <span
        class="sort-indicator"></span></span>
    <span class="row-duration">Length</span>
    <span class="row-size sortable" data-sort="size">Size <span class="sort-indicator"></span></span>
  </div>
  <div id="filelist" tabindex="0">
    <div id="search-spinner" class="search-spinner" hidden></div>
    <div id="file-rows"></div>
  </div>
  <div id="empty">
    <div id="empty-text">No audio files in this folder</div>
    <div id="loading-spinner" class="loading-spinner" hidden></div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="file-count"></span>
    <span id="statusbar-spacer"></span>
    <div class="dropdown" id="actions-dropdown">
      <button id="btn-actions" class="btn-quiet">
        <span>Actions &vsupnE; </span>
        <!-- <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="ellipsis-icon">
          <circle cx="5" cy="12" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <circle cx="19" cy="12" r="2"></circle>
        </svg> -->
      </button>
      <div class="dropdown-content" id="actions-menu">
        <button id="btn-normalize" title="Normalize audio levels for all files in this folder">Normalize Levels</button>
        <button id="btn-convert-wav" title="Convert all files to WAV format">Convert to WAV</button>
      </div>
    </div>
  </div>

  <!-- Transport bar -->
  <div id="transport">
    <button id="play-btn" title="Play/Pause (Space)"><svg width="12" height="12" viewBox="0 0 12 12">
        <polygon points="2,0 12,6 2,12" fill="currentColor" />
      </svg></button>
    <span id="transport-name">No file selected</span>
    <div id="progress-wrap">
      <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1">
    </div>
    <span id="transport-time">0:00 / 0:00</span>
    <div id="volume-control" title="Volume">
      <button id="volume-icon" title="Mute/Unmute"><svg id="vol-svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
          <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
          <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        </svg></button>
      <input type="range" id="volume-slider" min="0" max="100" value="100">
    </div>
    <label id="autoplay-toggle" title="Auto-play next track when current ends">
      <input type="checkbox" id="autoplay-cb"> Auto-next
    </label>
  </div>

  <!-- Keyboard hints -->
  <div id="hints">&#8593;&#8595; Navigate &nbsp; Enter Open folder &nbsp; Backspace Parent &nbsp; Space Play/Pause
    &nbsp; Esc Stop &nbsp; Del Recycle</div>

  <!-- Normalization progress modal -->
  <div id="norm-overlay">
    <div id="norm-dialog">
      <div id="norm-title">Normalizing Audio Levels</div>
      <div id="norm-phase"></div>
      <div id="norm-file"></div>
      <div id="norm-progress-wrap">
        <div id="norm-progress-bar"></div>
      </div>
      <div id="norm-count"></div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu">
    <div class="ctx-item" data-action="copyname">Copy Filename</div>
    <div class="ctx-item" data-action="copypath">Copy Path</div>
    <div class="ctx-item" data-action="delete">Delete</div>
  </div>

  <!-- Audio element -->
  <audio id="audio" preload="none"></audio>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>

</body>

</html>
